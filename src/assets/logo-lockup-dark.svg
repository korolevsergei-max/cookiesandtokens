<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 130" role="img" aria-label="Cookies &amp; Tokens">
  <!-- Full lockup for DARK backgrounds: cream wordmark. Mark + two-line wordmark.
       Wordmark is set in the display font; if Clash Display isn't loaded it
       falls back gracefully. For pixel-exact wordmark use the source PNG. -->
  <!-- Mark -->
  <g transform="translate(4,8)">
    <path d="M80 24 H110 L131 45 V75 L110 96 H80 L59 75 V45 Z"
      stroke="#3FD9C0" stroke-width="8" stroke-linejoin="round" fill="none"/>
    <!-- Bite painted as a navy circle over the disc (not an SVG <mask>): robust
         under GPU compositing, where mask refs can fail to paint. -->
    <circle cx="42" cy="60" r="44" fill="#A974E8"/>
    <circle cx="76" cy="33" r="20" fill="#11112e"/>
    <g fill="#F5EFE6">
      <circle cx="25" cy="51" r="5.5"/>
      <circle cx="50" cy="47" r="4.6"/>
      <circle cx="31" cy="74" r="6"/>
      <circle cx="57" cy="71" r="4.9"/>
      <circle cx="42" cy="61" r="3.6"/>
    </g>
    <g fill="#A974E8">
      <circle cx="80" cy="47" r="2.6"/>
      <circle cx="85" cy="39" r="1.7"/>
      <circle cx="77" cy="30" r="2.3" fill="#C39BF0"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g fill="#F5EFE6" font-family="'Clash Display','Satoshi',sans-serif" font-weight="600" letter-spacing="1">
    <text x="156" y="62" font-size="44">COOKIES</text>
    <text x="156" y="108" font-size="44">&amp; TOKENS</text>
  </g>
</svg>
