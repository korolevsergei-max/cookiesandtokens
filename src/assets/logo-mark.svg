<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 110" role="img" aria-label="Cookies &amp; Tokens mark">
  <!-- The combined lockup mark: teal token (octagon) with the purple cookie
       overlapping its left edge — the Venn that the Collision scene resolves
       onto. #lockup-token and #lockup-cookie are addressable end-state targets. -->
  <!-- Token octagon (behind) -->
  <g id="lockup-token">
    <path d="M73 21 H100 L119 40 V67 L100 86 H73 L54 67 V40 Z"
      stroke="#3FD9C0" stroke-width="7.5" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Cookie (in front, overlapping the octagon's left side) -->
  <g id="lockup-cookie">
    <!-- Disc as ONE closed path: smooth r=40 rim (centre 38,54) with the top-right
         edge replaced by small inward scallop arcs (the nibbled bite). Single
         non-self-intersecting outline, so the bite is transparent and the teal
         octagon shows through it; robust where the old two-arc scoop could drop. -->
    <path fill="#A974E8" d="M 77.85 50.51 A 40.00 40.00 0 1 1 41.49 14.15 A 9.27 9.27 0 0 0 46.51 28.23 A 6.38 6.38 0 0 0 49.30 38.15 A 4.00 4.00 0 0 0 53.85 42.70 A 6.38 6.38 0 0 0 63.77 45.49 A 9.27 9.27 0 0 0 77.85 50.51 Z" />
    <g fill="#FFFFFF">
      <circle cx="22" cy="46" r="5"/>
      <circle cx="46" cy="42" r="4.3"/>
      <circle cx="28" cy="68" r="5.5"/>
      <circle cx="53" cy="65" r="4.5"/>
      <circle cx="38" cy="56" r="3.4"/>
    </g>
    <g fill="#A974E8">
      <circle cx="66" cy="21" r="2.4"/>
      <circle cx="73" cy="13" r="1.6"/>
      <circle cx="78" cy="22" r="2.1" fill="#C39BF0"/>
      <circle cx="69" cy="29" r="1.4" fill="#C39BF0"/>
    </g>
  </g>
</svg>
